<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Финансы</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">💰 Финансы</div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Войти</button>
      <button class="auth-tab" data-tab="register">Регистрация</button>
    </div>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="example@mail.com" required />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="login-password" placeholder="••••••" required />
      </div>
      <div id="login-error" class="auth-error" style="display:none"></div>
      <button type="submit" class="btn-primary btn-full">Войти</button>
    </form>

    <form id="register-form" class="auth-form" style="display:none">
      <div class="form-group">
        <label>Имя</label>
        <input type="text" id="reg-name" placeholder="Как вас зовут?" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="example@mail.com" required />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="reg-password" placeholder="Минимум 6 символов" required />
      </div>
      <div id="reg-error" class="auth-error" style="display:none"></div>
      <button type="submit" class="btn-primary btn-full">Создать аккаунт</button>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="app" style="display:none">
  <aside class="sidebar">
    <div class="logo">💰 Финансы</div>
    <nav>
      <button class="nav-btn active" data-page="dashboard">Дашборд</button>
      <button class="nav-btn" data-page="expenses">Расходы</button>
      <button class="nav-btn" data-page="categories">Категории</button>
    </nav>
    <div class="sidebar-footer">
      <div id="user-name" class="user-name"></div>
      <button class="logout-btn" id="logout-btn">Выйти</button>
    </div>
  </aside>

  <main class="content">

    <!-- DASHBOARD -->
    <section id="page-dashboard" class="page active">
      <div class="page-header">
        <h1>Дашборд</h1>
        <div class="month-selector">
          <button id="prev-month">&#8592;</button>
          <span id="current-month-label"></span>
          <button id="next-month">&#8594;</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Всего за месяц</span>
          <span class="stat-value" id="stat-total">0 ₸</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Категорий использовано</span>
          <span class="stat-value" id="stat-cats">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Транзакций</span>
          <span class="stat-value" id="stat-count">0</span>
        </div>
      </div>

      <div class="charts-row">
        <div class="chart-card">
          <h3>По категориям</h3>
          <div class="chart-wrap"><canvas id="chart-pie"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>По дням</h3>
          <div class="chart-wrap"><canvas id="chart-bar"></canvas></div>
        </div>
      </div>

      <div class="card">
        <h3>Топ категорий за месяц</h3>
        <div id="category-breakdown"></div>
      </div>
    </section>

    <!-- EXPENSES -->
    <section id="page-expenses" class="page">
      <div class="page-header">
        <h1>Расходы</h1>
        <button class="btn-primary" id="open-add-modal">+ Добавить</button>
      </div>
      <div class="filters">
        <select id="filter-month"><option value="">Все месяцы</option></select>
        <select id="filter-category"><option value="">Все категории</option></select>
      </div>
      <div class="card">
        <table class="expenses-table">
          <thead>
            <tr>
              <th>Дата</th><th>Категория</th><th>Описание</th><th>Сумма</th><th></th>
            </tr>
          </thead>
          <tbody id="expenses-list"></tbody>
        </table>
        <div id="expenses-empty" class="empty-state" style="display:none">Нет расходов. Добавьте первый!</div>
      </div>
    </section>

    <!-- CATEGORIES -->
    <section id="page-categories" class="page">
      <div class="page-header"><h1>Категории</h1></div>
      <div class="card">
        <div class="add-category-form">
          <input type="text" id="new-category-name" placeholder="Название категории" maxlength="30" />
          <input type="color" id="new-category-color" value="#6c63ff" title="Цвет" />
          <button class="btn-primary" id="add-category-btn">Добавить</button>
        </div>
      </div>
      <div class="card">
        <div id="categories-list"></div>
        <div id="categories-empty" class="empty-state" style="display:none">Нет категорий.</div>
      </div>
    </section>

  </main>
</div>

<!-- ADD EXPENSE MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>Новый расход</h2>
      <button class="modal-close" id="close-modal">&times;</button>
    </div>
    <form id="expense-form">
      <div class="form-group">
        <label>Сумма (₸)</label>
        <input type="number" id="exp-amount" placeholder="0" min="0" step="1" required />
      </div>
      <div class="form-group">
        <label>Категория</label>
        <select id="exp-category" required>
          <option value="">Выберите категорию</option>
        </select>
      </div>
      <div class="form-group">
        <label>Дата</label>
        <input type="date" id="exp-date" required />
      </div>
      <div class="form-group">
        <label>Описание (необязательно)</label>
        <input type="text" id="exp-desc" placeholder="За что потратил?" maxlength="100" />
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="cancel-modal">Отмена</button>
        <button type="submit" class="btn-primary">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
